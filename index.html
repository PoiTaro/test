<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3Dスイカゲーム</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #fdf5e6;
            --container-color: #f4a460;
            --text-color: #6d4c41;
            --font-family: 'M PLUS Rounded 1c', sans-serif;
        }
        body {
            margin: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: var(--bg-color);
            font-family: var(--font-family); color: var(--text-color);
            overflow: hidden; touch-action: none;
        }
        .game-container {
            position: relative; width: 100%; max-width: 480px; height: 100%;
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }
        .header {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; box-sizing: border-box; z-index: 10;
        }
        .score-box, .next-fruit-box {
            background-color: rgba(255, 255, 255, 0.7); padding: 8px 15px;
            border-radius: 20px; border: 3px solid var(--container-color); text-align: center;
        }
        .score-box h2, .next-fruit-box h2 { margin: 0; font-size: 14px; font-weight: 700; }
        #score { font-size: 20px; font-weight: 800; margin-top: 4px; }
        .next-fruit-display {
            display: flex; justify-content: center; align-items: center;
            width: 50px; height: 50px; margin-top: 4px;
        }
        .next-fruit-visual { border-radius: 50%; border: 2px solid #5a3e36; }
        #game-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; 
        }
        .game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; color: white; text-align: center;
        }
        .game-over-screen h1 { font-size: 48px; margin: 0; text-shadow: 2px 2px 4px #000; }
        .game-over-screen p { font-size: 24px; margin: 10px 0 20px; }
        #restart-button {
            padding: 15px 30px; font-size: 20px; font-family: var(--font-family); font-weight: 700;
            border: none; border-radius: 30px; background-color: #ff7f50; color: white;
            cursor: pointer; box-shadow: 0 5px 0 #d2691e; transition: all 0.1s ease-in-out;
        }
        #restart-button:active { transform: translateY(5px); box-shadow: none; }
        .combo-popup, .celebration-message {
            position: absolute; font-weight: 800; color: #ff4500;
            text-shadow: 3px 3px 0 white, -3px -3px 0 white, 3px -3px 0 white, -3px 3px 0 white;
            pointer-events: none; z-index: 50;
        }
        .combo-popup { font-size: 36px; animation: combo-animation 1.5s ease-out forwards; }
        @keyframes combo-animation {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            50% { transform: translateY(-50px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
        }
        .celebration {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 200;
        }
        .celebration-message {
            top: 25%; left: 50%; transform: translate(-50%, -50%); font-size: 48px;
            animation: celebration-fade 3s forwards;
        }
        @keyframes celebration-fade {
            0%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            10%, 90% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .confetti {
            position: absolute; width: 10px; height: 10px;
            background-color: #f00; opacity: 0;
            animation: confetti-fall 5s linear forwards;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="header">
            <div class="score-box"><h2>スコア</h2><div id="score">0</div></div>
            <div class="next-fruit-box"><h2>つぎ</h2><div id="next-fruit" class="next-fruit-display"></div></div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div class="game-over-screen" id="game-over-screen">
            <h1>ゲームオーバー</h1>
            <p>最終スコア: <span id="final-score">0</span></p>
            <button id="restart-button">もう一度！</button>
        </div>
    </div>

    <script>
        // --- モジュールのエイリアス ---
        const { Engine, Runner, World, Bodies, Body, Events, Composite } = Matter;
        const { Scene, WebGLRenderer, OrthographicCamera, AmbientLight, DirectionalLight, SphereGeometry, MeshStandardMaterial, Mesh, BoxGeometry, PlaneGeometry, Line, BufferGeometry, Vector3, LineDashedMaterial } = THREE;

        // --- DOM要素と設定 ---
        const gameContainer = document.getElementById('game-container');
        const canvas = document.getElementById('game-canvas');
        const scoreElement = document.getElementById('score');
        const nextFruitElement = document.getElementById('next-fruit');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreElement = document.getElementById('final-score');
        const restartButton = document.getElementById('restart-button');
        
        const logicalWidth = 480;
        const logicalHeight = logicalWidth * 1.77; 
        
        const wallThickness = 50;
        const topDropY = 80;
        const bottomY = logicalHeight - 40; 
        const deadLineY = 110;
        const containerColor = '#f4a460';

        const FRUITS = [
            { level: 0, radius: 15, color: '#ffb3b3', score: 1, name: 'さくらんぼ' },
            { level: 1, radius: 20, color: '#ff69b4', score: 3, name: 'いちご' },
            { level: 2, radius: 28, color: '#d9a1ff', score: 6, name: 'ぶどう' },
            { level: 3, radius: 35, color: '#ff8c69', score: 10, name: 'デコポン' },
            { level: 4, radius: 45, color: '#ff6969', score: 15, name: 'かき' },
            { level: 5, radius: 55, color: '#ff4500', score: 21, name: 'りんご' },
            { level: 6, radius: 65, color: '#fffacd', score: 28, name: 'なし' },
            { level: 7, radius: 75, color: '#ffc0cb', score: 36, name: 'もも' },
            { level: 8, radius: 85, color: '#f0e68c', score: 45, name: 'パイナップル' },
            { level: 9, radius: 95, color: '#90ee90', score: 55, name: 'メロン' },
            { level: 10, radius: 110, color: '#3cb371', score: 66, name: 'スイカ' }
        ];
        const MAX_FRUIT_LEVEL = 5;

        // --- ゲーム変数 ---
        let physicsEngine, world;
        let threeScene, threeRenderer, camera;
        let score, currentFruit, nextFruitType, comboCount, gameOverTimeout;
        let canDrop = true, gameOver = false, isDragging = false;
        let isFruitInDangerZone = false, comboTimeout;
        let guideLine, deadLine;
        let animationFrameId;

        // --- メイン処理 ---
        function main() {
            score = 0; gameOver = false; canDrop = true; isDragging = false;
            comboCount = 0; currentFruit = null; gameOverTimeout = null;
            scoreElement.textContent = '0';
            gameOverScreen.style.display = 'none';

            // BUG FIX: 物理エンジンの計算精度を上げて突き抜けを防止
            physicsEngine = Engine.create({
                gravity: { y: -1 },
                positionIterations: 10, // 物理計算の精度を上げる
                velocityIterations: 8  // 物理計算の精度を上げる
            });
            world = physicsEngine.world;

            setupThreeJS();
            
            Composite.clear(world, false);

            setupBounds();
            selectNextFruit();
            prepareNextFruit();
            setupEventListeners();
            
            animate();
        }
        
        // --- 3Dシーンのセットアップ ---
        function setupThreeJS() {
            threeScene = new Scene();
            threeRenderer = new WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            threeRenderer.setPixelRatio(window.devicePixelRatio);
            threeRenderer.shadowMap.enabled = true;

            camera = new OrthographicCamera(
                -logicalWidth / 2, logicalWidth / 2, 
                logicalHeight / 2, -logicalHeight / 2, 
                1, 1000
            );
            camera.position.set(0, 0, 500); 
            camera.lookAt(0, 0, 0);

            const ambientLight = new AmbientLight(0xffffff, 0.6);
            threeScene.add(ambientLight);
            const directionalLight = new DirectionalLight(0xffffff, 0.6);
            directionalLight.position.set(100, 200, 300);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            threeScene.add(directionalLight);

            handleResize();
        }

        // --- 物理空間と3D空間の境界設定 ---
        function setupBounds() {
            const floorPhysicsY = -(bottomY - logicalHeight / 2);
            const wallX = logicalWidth / 2;
            const physicsWallThickness = 10;
            // BUG FIX: 物理的な床を厚くして突き抜けを防止
            const physicalFloorHeight = 50; 

            const floorBody = Bodies.rectangle(0, floorPhysicsY - (physicalFloorHeight / 2) + (physicsWallThickness / 2), logicalWidth, physicalFloorHeight, { isStatic: true });
            World.add(world, [
                floorBody,
                Bodies.rectangle(-wallX, 0, physicsWallThickness, logicalHeight, { isStatic: true }),
                Bodies.rectangle(wallX, 0, physicsWallThickness, logicalHeight, { isStatic: true }),
            ]);

            const tankDepth = 230;
            const glassThickness = 15;
            const glassMaterial = new MeshStandardMaterial({
                color: 0xf4a460, metalness: 0.1, roughness: 0.05,
                transparent: true, opacity: 0.25
            });

            const backWall = new Mesh(new BoxGeometry(logicalWidth, logicalHeight, glassThickness), glassMaterial);
            backWall.position.set(0, 0, -tankDepth / 2);
            threeScene.add(backWall);

            const leftWall = new Mesh(new BoxGeometry(glassThickness, logicalHeight, tankDepth), glassMaterial);
            leftWall.position.set(-logicalWidth / 2 + glassThickness / 2, 0, 0);
            threeScene.add(leftWall);

            const rightWall = new Mesh(new BoxGeometry(glassThickness, logicalHeight, tankDepth), glassMaterial);
            rightWall.position.set(logicalWidth / 2 - glassThickness / 2, 0, 0);
            threeScene.add(rightWall);

            const bottomWall = new Mesh(new BoxGeometry(logicalWidth, glassThickness, tankDepth), glassMaterial);
            bottomWall.position.set(0, floorPhysicsY, 0);
            threeScene.add(bottomWall);
            
            const frontGlassMaterial = glassMaterial.clone();
            frontGlassMaterial.opacity = 0.1;
            const frontWall = new Mesh(new BoxGeometry(logicalWidth, logicalHeight, glassThickness), frontGlassMaterial);
            frontWall.position.z = tankDepth / 2;
            threeScene.add(frontWall);
            
            const shadowPlane = new Mesh(
                new PlaneGeometry(logicalWidth, logicalHeight), 
                new MeshStandardMaterial({ color: 0xfdf5e6 })
            );
            shadowPlane.position.z = -tankDepth / 2 + glassThickness / 2 + 1;
            shadowPlane.receiveShadow = true;
            threeScene.add(shadowPlane);

            deadLine = new Line(new BufferGeometry().setFromPoints([new Vector3(-logicalWidth/2, 0, 10), new Vector3(logicalWidth/2, 0, 10)]), new LineDashedMaterial({ color: 0xff0000, dashSize: 15, gapSize: 5, scale: 1 }));
            deadLine.computeLineDistances();
            deadLine.position.y = -(deadLineY - logicalHeight/2);
            threeScene.add(deadLine);

            guideLine = new Line(new BufferGeometry().setFromPoints([new Vector3(0,0,10), new Vector3(0,-100,10)]), new LineDashedMaterial({ color: 0x3d2c27, dashSize: 8, gapSize: 8, scale: 1 }));
            guideLine.computeLineDistances();
            guideLine.visible = false;
            threeScene.add(guideLine);
        }

        function createFruit(x, y, level, isStatic = false) {
            const fruitData = FRUITS[level];
            if (!fruitData) return null;
            const body = Bodies.circle(x, y, fruitData.radius, {
                isStatic: isStatic, 
                restitution: 0.2, 
                friction: 0.7, 
                label: 'fruit',
                plugin: { level: level }
            });
            const geometry = new SphereGeometry(fruitData.radius, 32, 32);
            const material = new MeshStandardMaterial({ color: fruitData.color, roughness: 0.7 });
            const mesh = new Mesh(geometry, material);
            mesh.position.set(x, y, 0);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            body.threeMesh = mesh;
            return body;
        }

        function prepareNextFruit() {
            if (gameOver) return;
            const x = 0;
            const y = -(topDropY - logicalHeight / 2);
            currentFruit = createFruit(x, y, nextFruitType, true);
            World.add(world, currentFruit);
            threeScene.add(currentFruit.threeMesh);
            selectNextFruit();
            updateNextFruitDisplay();
        }

        function selectNextFruit() { nextFruitType = Math.floor(Math.random() * MAX_FRUIT_LEVEL); }
        
        function updateNextFruitDisplay() {
            nextFruitElement.innerHTML = '';
            const fruitData = FRUITS[nextFruitType];
            const fruitVisual = document.createElement('div'); fruitVisual.className = 'next-fruit-visual';
            const displaySize = Math.min(45, fruitData.radius * 2);
            fruitVisual.style.width = `${displaySize}px`; fruitVisual.style.height = `${displaySize}px`;
            fruitVisual.style.backgroundColor = fruitData.color;
            nextFruitElement.appendChild(fruitVisual);
        }

        function handleDragStart(event) { if (!canDrop || gameOver) return; isDragging = true; moveFruitToPosition(event); }
        function handleDragMove(event) { if (!isDragging) return; moveFruitToPosition(event); }
        function handleDragEnd(event) {
            if (!isDragging) return; isDragging = false;
            if (!currentFruit || !canDrop || gameOver) return;
            canDrop = false; Body.setStatic(currentFruit, false); currentFruit = null;
            setTimeout(() => { canDrop = true; if (!gameOver) prepareNextFruit(); }, 800);
        }
        function moveFruitToPosition(event) {
            event.preventDefault();
            let x;
            if (event.type.startsWith('touch')) { x = event.touches[0]?.clientX || event.changedTouches[0]?.clientX; }
            else { x = event.clientX; }
            if (x === undefined) return;
            const rect = canvas.getBoundingClientRect();
            const relativeX = (x - rect.left) * (logicalWidth / rect.width) - logicalWidth / 2;
            if (currentFruit) {
                const fruitRadius = currentFruit.circleRadius;
                const clampedX = Math.max(fruitRadius - (logicalWidth/2), Math.min(relativeX, logicalWidth/2 - fruitRadius));
                Body.setPosition(currentFruit, { x: clampedX, y: currentFruit.position.y });
            }
        }

        function setupEventListeners() {
            canvas.addEventListener('mousedown', handleDragStart); canvas.addEventListener('touchstart', handleDragStart, { passive: false });
            canvas.addEventListener('mousemove', handleDragMove); canvas.addEventListener('touchmove', handleDragMove, { passive: false });
            canvas.addEventListener('mouseup', handleDragEnd); canvas.addEventListener('touchend', handleDragEnd, { passive: false });
            canvas.addEventListener('mouseleave', handleDragEnd);
            Events.on(physicsEngine, 'collisionStart', handleCollision);
            window.addEventListener('resize', handleResize);
        }
        
        function handleCollision(event) {
            if (gameOver) return;
            for (const pair of event.pairs) {
                const { bodyA, bodyB } = pair;
                if (bodyA.label !== 'fruit' || bodyB.label !== 'fruit' || bodyA.plugin.level !== bodyB.plugin.level) continue;
                const level = bodyA.plugin.level;
                if (level >= FRUITS.length - 1 || !world.bodies.includes(bodyA) || !world.bodies.includes(bodyB)) continue;
                
                const nextLevel = level + 1;
                const collisionPoint = pair.collision.supports[0];
                
                World.remove(world, [bodyA, bodyB]);
                threeScene.remove(bodyA.threeMesh, bodyB.threeMesh);
                
                const newFruitBody = createFruit(collisionPoint.x, collisionPoint.y, nextLevel);
                World.add(world, newFruitBody);
                threeScene.add(newFruitBody.threeMesh);

                const newMesh = newFruitBody.threeMesh;
                newMesh.scale.set(1.2, 1.2, 1.2);
                setTimeout(() => newMesh.scale.set(1, 1, 1), 100);
                
                handleScoreAndCombo(FRUITS[nextLevel].score, {x: collisionPoint.x + logicalWidth/2, y: -collisionPoint.y + logicalHeight/2});
                if (nextLevel === FRUITS.length - 1) triggerSuikaCelebration();
            }
        }
        
        function handleScoreAndCombo(baseScore, position) {
            clearTimeout(comboTimeout); comboCount++;
            const comboBonus = Math.pow(2, Math.min(comboCount - 1, 5));
            score += baseScore * comboBonus;
            scoreElement.textContent = score;
            if (comboCount > 1) showPopup(comboCount, position);
            comboTimeout = setTimeout(() => { comboCount = 0; }, 1000);
        }
        
        function showPopup(count, position) {
            const popup = document.createElement('div'); popup.className = 'combo-popup';
            popup.textContent = `${count} COMBO!`;
            const rect = canvas.getBoundingClientRect();
            popup.style.left = `${(position.x / logicalWidth) * rect.width}px`;
            popup.style.top = `${(position.y / logicalHeight) * rect.height}px`;
            gameContainer.appendChild(popup);
            setTimeout(() => popup.remove(), 1500);
        }

        function checkGameOver() {
            if (gameOver) return;
            isFruitInDangerZone = false;
            const deadLinePhysicsY = -(deadLineY - logicalHeight / 2);
            for (const fruit of Composite.allBodies(world)) {
                if (fruit.label === 'fruit' && !fruit.isStatic && fruit.speed < 0.05 && fruit.position.y + fruit.circleRadius > deadLinePhysicsY) {
                    isFruitInDangerZone = true;
                    break;
                }
            }
            if (isFruitInDangerZone) {
                if (!gameOverTimeout) gameOverTimeout = setTimeout(triggerGameOver, 2000);
            } else {
                clearTimeout(gameOverTimeout);
                gameOverTimeout = null;
            }
        }
        
        function triggerGameOver() {
            if (gameOver) return;
            gameOver = true; canDrop = false; isDragging = false;
            finalScoreElement.textContent = score;
            gameOverScreen.style.display = 'flex';
            cancelAnimationFrame(animationFrameId);
        }

        function triggerSuikaCelebration() {
            const celebration = document.createElement('div'); celebration.className = 'celebration';
            const message = document.createElement('div'); message.className = 'celebration-message';
            message.textContent = 'スイカできた！';
            celebration.appendChild(message);
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div'); confetti.className = 'confetti';
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 90%, 65%)`;
                confetti.style.animationDelay = `${Math.random() * 0.5}s`;
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                celebration.appendChild(confetti);
            }
            gameContainer.appendChild(celebration);
            setTimeout(() => celebration.remove(), 5000);
        }

        function removeAllEventListeners() {
            canvas.removeEventListener('mousedown', handleDragStart); canvas.removeEventListener('touchstart', handleDragStart);
            canvas.removeEventListener('mousemove', handleDragMove); canvas.removeEventListener('touchmove', handleDragMove);
            canvas.removeEventListener('mouseup', handleDragEnd); canvas.removeEventListener('touchend', handleDragEnd);
            canvas.removeEventListener('mouseleave', handleDragEnd);
            window.removeEventListener('resize', handleResize);
            if (physicsEngine) Events.off(physicsEngine);
        }

        function restartGame() {
            cancelAnimationFrame(animationFrameId);
            removeAllEventListeners();
            if(world) World.clear(world);
            if(physicsEngine) Engine.clear(physicsEngine);
            if(threeScene) {
                while(threeScene.children.length > 0){ 
                    threeScene.remove(threeScene.children[0]); 
                }
            }
            main();
        }
        restartButton.addEventListener('click', restartGame);

        function handleResize() {
            const containerRect = gameContainer.getBoundingClientRect();
            const targetAspect = logicalWidth / logicalHeight;
            const screenAspect = containerRect.width / containerRect.height;
            let newWidth, newHeight, x, y;

            if (screenAspect > targetAspect) {
                newHeight = containerRect.height;
                newWidth = newHeight * targetAspect;
                x = (containerRect.width - newWidth) / 2;
                y = 0;
            } else {
                newWidth = containerRect.width;
                newHeight = newWidth / targetAspect;
                x = 0;
                y = (containerRect.height - newHeight) / 2;
            }

            threeRenderer.setSize(containerRect.width, containerRect.height);
            threeRenderer.setViewport(x, y, newWidth, newHeight);
            threeRenderer.setScissor(x, y, newWidth, newHeight);
            threeRenderer.setScissorTest(true);
        }

        // --- アニメーションループ ---
        function animate() {
            if(gameOver) return;
            animationFrameId = requestAnimationFrame(animate);

            Engine.update(physicsEngine, 1000 / 60);

            for (const body of Composite.allBodies(world)) {
                if (body.threeMesh) {
                    body.threeMesh.position.x = body.position.x;
                    body.threeMesh.position.y = body.position.y;
                    body.threeMesh.rotation.z = body.angle;
                }
            }
            
            if(currentFruit && canDrop) {
                guideLine.visible = true;
                const pos = currentFruit.position;
                const floorY3D = -(bottomY - logicalHeight / 2);
                const points = [new Vector3(pos.x, pos.y - currentFruit.circleRadius, 10), new Vector3(pos.x, floorY3D, 10)];
                guideLine.geometry.setFromPoints(points);
                guideLine.computeLineDistances();
            } else {
                guideLine.visible = false;
            }

            if(isFruitInDangerZone) {
                deadLine.material.color.setHSL(0, 1, 0.5 + Math.sin(Date.now()/100) * 0.1);
                deadLine.material.needsUpdate = true;
            } else {
                deadLine.material.color.setHex(0xff0000);
            }

            checkGameOver();
            threeRenderer.render(threeScene, camera);
        }

        // --- ゲーム開始 ---
        main();
    </script>
</body>
</html>
